<title>Commission Review</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --bg-card: #ffffff;
    --bg-elevated: #f3f0eb;
    --border: #e8e3db;
    --border-strong: #d4cdc2;
    --text: #1a1714;
    --text-dim: #6b6560;
    --text-muted: #a09890;
    --accent: #c45c2e;
    --accent-light: #f5ede8;
    --green: #2d7a4f;
    --green-light: #e8f5ee;
    --red: #c0392b;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .app { max-width: 680px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header { background: var(--text); color: #fff; padding: 28px 24px 22px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.02em; }
  .header h1 em { color: #d4a574; font-style: italic; }
  .header .meta { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .header .summary-strip { display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); }
  .header .summary-strip .s-item { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }
  .header .summary-strip .s-val { font-size: 18px; font-weight: 600; color: #fff; display: block; margin-top: 2px; }

  /* Sections */
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); padding: 20px 20px 8px; }

  /* Rep cards */
  .rep-card { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; gap: 12px; }
  .rep-card:hover { background: var(--bg-elevated); }

// ── state ──────────────────────────────────────────────────
// Deep-copy so we can track mutations
let state = JSON.parse(JSON.stringify(RAW_REPS));
let deletedIds = {}; // { repName: Set of item ids }
let addedItems = {}; // { repName: [items] }
let currentRep = null;

function displayCustomer(name) {
  // Strip "ZZ " prefix used as sort hack (forces New Hire Bonus to bottom)
  var s = String(name || '');
  if (s.substring(0, 3) === 'ZZ ') return s.substring(3);
  return s;
}

function fmtMoney(n) {
  const v = Math.round(Number(n) || 0);
  return (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString();
}

function getRepState(repName) {
  return state.find(r => r.rep === repName);
}

function repTotal(repName) {
  const rs = getRepState(repName);
  if (!rs) return 0;
  const deleted = deletedIds[repName] || new Set();
  const added = addedItems[repName] || [];
  const base = rs.items
    .filter(it => !deleted.has(it.id))
    .reduce((s, it) => s + (Number(it.repPay) || 0), 0);
  const addedTotal = added.reduce((s, it) => s + (Number(it.repPay) || 0), 0);
  return base + addedTotal;
}

function originalRepTotal(repName) {
  const raw = RAW_REPS.find(r => r.rep === repName);
  return raw ? raw.total : 0;
}

function isRepModified(repName) {
  const rs = getRepState(repName);
  const raw = RAW_REPS.find(r => r.rep === repName);
  if (!rs || !raw) return false;
  if ((deletedIds[repName] || new Set()).size > 0) return true;
  if ((addedItems[repName] || []).length > 0) return true;
  for (let i = 0; i < rs.items.length; i++) {
    const cur = rs.items[i], orig = raw.items[i];
    if (!orig) return true;
    if (cur.rep !== orig.rep || cur.detail !== orig.detail || Number(cur.repPay) !== Number(orig.repPay)) return true;
  }
  return false;
}

function countTotalChanges() {
  return state.filter(r => isRepModified(r.rep)).length;
}

// ── mutations ──────────────────────────────────────────────
function updateItem(repName, itemId, field, value) {
  const rs = getRepState(repName);
  if (!rs) return;
  const it = rs.items.find(i => i.id === itemId);
  if (!it) return;
  it[field] = field === 'repPay' ? (Number(value) || 0) : value;
}

function deleteItem(repName, itemId) {
  if (!deletedIds[repName]) deletedIds[repName] = new Set();
  deletedIds[repName].add(itemId);
  render();
}

function restoreItem(repName, itemId) {
  if (deletedIds[repName]) deletedIds[repName].delete(itemId);
  render();
}

function updateAdded(repName, addedIdx, field, value) {
  if (!addedItems[repName] || !addedItems[repName][addedIdx]) return;
  addedItems[repName][addedIdx][field] = field === 'repPay' ? (Number(value) || 0) : value;
}

function removeAdded(repName, addedIdx) {
  if (addedItems[repName]) addedItems[repName].splice(addedIdx, 1);
  render();
}

function confirmAddItem(repName) {
  const customer = (document.getElementById('new-customer').value || '').trim();
  const detail   = (document.getElementById('new-desc').value || '').trim();
  const repPay   = Number(document.getElementById('new-pay').value) || 0;
  if (!customer) { alert('Please enter a customer name.'); return; }
  if (!addedItems[repName]) addedItems[repName] = [];
  addedItems[repName].push({ customer, detail, description: detail, repPay, revenue: 0, rep: repName, category: 'Adjustment', status: 'Manual', saleDate: '', actDate: '' });
  showingAddRow = false;
  render();
}

const GH_VIEWER_URL   = 'https://TheRealCoBo.github.io/Highline-CS-Viewer';
const GH_API          = 'https://api.github.com/repos';

const GH_HEADERS = {
  'Authorization': `token ${GH_TOKEN}`,
  'Accept': 'application/vnd.github.v3+json',
  'Content-Type': 'application/json',
};

async function ghGetSHA(repo, path) {
  try {
    const res = await fetch(`${GH_API}/${GH_OWNER}/${repo}/contents/${path}`, { headers: GH_HEADERS });
    if (!res.ok) return null;
    const data = await res.json();
    return data.sha || null;
  } catch (e) { return null; }
}

async function ghPutFile(repo, path, content, message, sha) {
  const body = { message, content: btoa(unescape(encodeURIComponent(content))) };
  if (sha) body.sha = sha;
  const res = await fetch(`${GH_API}/${GH_OWNER}/${repo}/contents/${path}`, {
    method: 'PUT', headers: GH_HEADERS, body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || `GitHub error ${res.status}`);
  }
  return res.json();
}

async function ghDeleteFile(repo, path, message) {
  const sha = await ghGetSHA(repo, path);
  if (!sha) return;
  await fetch(`${GH_API}/${GH_OWNER}/${repo}/contents/${path}`, {
    method: 'DELETE', headers: GH_HEADERS,
    body: JSON.stringify({ message, sha })
  });
}

async function ghGetFile(repo, path) {
  try {
    const res = await fetch(`${GH_API}/${GH_OWNER}/${repo}/contents/${path}`, { headers: GH_HEADERS });
    if (!res.ok) return null;
    const data = await res.json();
    return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
  } catch (e) { return null; }
}

async function submitReview() {
  const changes = buildChangeset();
  if (!changes.modified.length && !changes.added.length && !changes.deleted.length) {
    if (!confirm('No changes have been made. Submit anyway?')) return;
  }

  // Show submitting modal immediately
  showSubmittingModal();

  try {
    // Build payload
    const payload = {
      v: 2,
      period: PERIOD,
      office: OFFICE,
      ts: Date.now(),
      changes
    };

    // Push submission.json to reviewer repo
    setSubmitStep(20, 'Uploading changes…');
    const existingSha = await ghGetSHA(GH_REVIEW_REPO, 'submission.json');
    await ghPutFile(
      GH_REVIEW_REPO,
      'submission.json',
      JSON.stringify(payload, null, 2),
      `Submission: ${PERIOD.from} to ${PERIOD.to}`,
      existingSha
    );

    // Clear any old viewer_ready flag
    setSubmitStep(40, 'Clearing previous report…');
    await ghDeleteFile(GH_REVIEW_REPO, 'viewer_ready.json', 'Clear viewer ready flag');

    setSubmitStep(60, 'Notifying admin…');

    // Show waiting UI
    showWaitingForViewer();

    // Start polling for viewer_ready.json
    pollForViewerReady();

  } catch (err) {
    console.error('Submit failed:', err);
    showSubmitError(err.message);
  }
}

let _pollTimer = null;
let _pollCount = 0;

function pollForViewerReady() {
  _pollCount = 0;
  _pollTimer = setInterval(async () => {
    _pollCount++;
    const ready = await ghGetFile(GH_REVIEW_REPO, 'viewer_ready.json');
    if (ready && ready.ready) {
      clearInterval(_pollTimer);
      showViewerReady();
    }
    // Stop polling after 10 minutes
    if (_pollCount > 120) clearInterval(_pollTimer);
  }, 5000);
}

}

function showViewerReady() {
  removeSubmitModal();
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'submitModal';
  div.innerHTML = `
    <div class="modal">
      <h3>🎉 Your Report is Ready!</h3>
      <p style="margin-bottom:16px;">The admin has processed the final numbers. Your report is going live now.</p>
      <div style="background:rgba(110,169,124,0.08);border:1px solid rgba(110,169,124,0.25);border-radius:8px;padding:16px;text-align:center;margin-bottom:16px;">
        <div style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Live in</div>
        <div id="viewerCountdown" style="font-family:'DM Serif Display',serif;font-size:52px;color:var(--accent);line-height:1;">60</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">seconds</div>
        <div style="margin-top:10px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
          <div id="viewerCountdownBar" style="height:100%;width:100%;background:var(--accent);transition:width 1s linear;border-radius:2px;"></div>
        </div>
      </div>
      <div id="viewerLinkSection" style="display:none;text-align:center;padding:12px;background:rgba(110,169,124,0.1);border:1px solid rgba(110,169,124,0.3);border-radius:8px;margin-bottom:16px;">
        <div style="color:#8fc89a;font-weight:600;margin-bottom:6px;">Live now! 🎉</div>
        <a href="${GH_VIEWER_URL + '?v=' + Date.now()}" target="_blank" style="color:#8fc89a;font-size:12px;word-break:break-all;">${GH_VIEWER_URL}</a>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn" onclick="removeSubmitModal()">Close</button>
        <a id="viewerLiveBtn" href="${GH_VIEWER_URL + '?v=' + Date.now()}" target="_blank" class="btn" style="text-decoration:none;opacity:0.4;pointer-events:none;">Open Report ↗</a>
      </div>
    </div>`;
  document.body.appendChild(div);
  _submitModal = div;

  // Start 60 second countdown
  let secs = 60;
  const cdEl  = document.getElementById('viewerCountdown');
  const cdBar = document.getElementById('viewerCountdownBar');
  const lsEl  = document.getElementById('viewerLinkSection');
  const lbEl  = document.getElementById('viewerLiveBtn');

  const ticker = setInterval(() => {
    secs--;
    if (cdEl)  cdEl.textContent = secs;
    if (cdBar) cdBar.style.width = (secs / 60 * 100) + '%';
    if (secs <= 0) {
      clearInterval(ticker);
      if (cdEl && cdEl.parentElement) cdEl.parentElement.style.display = 'none';
      if (lsEl) lsEl.style.display = 'block';
      if (lbEl) {
        lbEl.style.opacity = '1';
        lbEl.style.pointerEvents = 'auto';
        lbEl.className = 'btn primary';
        lbEl.textContent = 'Open Report ↗';
        lbEl.href = GH_VIEWER_URL + '?v=' + Date.now();
      }
    }
  }, 1000);
}

function showSubmitError(msg) {
  removeSubmitModal();
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'submitModal';
  div.innerHTML = `
    <div class="modal">
      <h3 style="color:#e09a9b;">✗ Submission Failed</h3>
      <p style="margin-bottom:12px;">Could not reach GitHub. Please check your connection and try again.</p>
      <div style="background:rgba(198,120,121,0.1);border:1px solid rgba(198,120,121,0.3);border-radius:6px;padding:10px;font-size:12px;color:#e09a9b;margin-bottom:16px;">${escH(msg)}</div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn" onclick="removeSubmitModal()">Close</button>
        <button class="btn primary" onclick="removeSubmitModal();submitReview()">Try Again</button>
      </div>
    </div>`;
  document.body.appendChild(div);
  _submitModal = div;
}

function buildChangeset() {
  const modified = [], added = [], deleted = [];
  for (const repData of state) {
    const repName = repData.rep;
    const rawRep  = RAW_REPS.find(r => r.rep === repName);
    if (!rawRep) continue;
    const delSet  = deletedIds[repName] || new Set();
    const addList = addedItems[repName] || [];
    for (let i = 0; i < repData.items.length; i++) {
      const cur = repData.items[i];
      const orig = rawRep.items[i];
      if (!orig) continue;
      if (delSet.has(cur.id)) {
        deleted.push({ rep: repName, id: cur.id, customer: cur.customer });
      } else if (cur.rep !== orig.rep || cur.detail !== orig.detail || Number(cur.repPay) !== Number(orig.repPay)) {
        modified.push({
          rep: repName, id: cur.id, customer: cur.customer,
          orig: { rep: orig.rep, detail: orig.detail, repPay: orig.repPay },
          edit: { rep: cur.rep, detail: cur.detail, repPay: cur.repPay }
        });
      }
    }
    addList.forEach(it => added.push({ ...it, rep: repName }));
  }
  return { modified, added, deleted };
}

function escH(s) {
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── boot ───────────────────────────────────────────────────
render();
</script>
